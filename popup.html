<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>myself - 专注模式</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 300px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #1a1a2e;
      color: #eee;
      font-size: 13px;
    }

    h1 {
      font-size: 16px;
      text-align: center;
      letter-spacing: 2px;
      margin-bottom: 12px;
    }

    /* ---- 分隔线 ---- */
    .divider {
      height: 1px;
      background: #333;
      margin: 12px 0;
      border: none;
    }

    /* ---- 标签 ---- */
    .label {
      font-size: 11px;
      color: #888;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* ---- 按钮通用 ---- */
    .btn {
      display: block;
      width: 100%;
      padding: 8px 0;
      margin-bottom: 8px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.85; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-enter    { background: #4caf50; color: #fff; }
    .btn-leave    { background: #e53935; color: #fff; }
    .btn-quick    { background: #ff9800; color: #fff; }
    .btn-add      { background: #2196f3; color: #fff; }

    /* ---- 状态文字 ---- */
    .status-text {
      font-size: 12px;
      text-align: center;
      margin-bottom: 8px;
      min-height: 16px;
      color: #888;
    }
    .status-text.active { color: #4caf50; }

    /* ---- 当前域名信息 ---- */
    .current-domain {
      text-align: center;
      font-size: 12px;
      color: #ff9800;
      margin-bottom: 8px;
      word-break: break-all;
    }

    /* ---- 输入行 ---- */
    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 8px;
    }
    .input-row input {
      flex: 1;
      padding: 8px 10px;
      border: 1px solid #444;
      border-radius: 6px;
      background: #0f0f23;
      color: #eee;
      font-size: 12px;
      outline: none;
    }
    .input-row input:focus { border-color: #2196f3; }
    .input-row input::placeholder { color: #555; }
    .input-row button {
      padding: 8px 14px;
      white-space: nowrap;
      margin-bottom: 0;
      width: auto;
    }

    /* ---- 黑名单列表 ---- */
    .blocklist-container {
      max-height: 180px;
      overflow-y: auto;
      margin-top: 4px;
    }

    .blocklist-container::-webkit-scrollbar { width: 4px; }
    .blocklist-container::-webkit-scrollbar-thumb {
      background: #444;
      border-radius: 2px;
    }

    .blocklist-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 8px;
      border-radius: 4px;
      margin-bottom: 2px;
      background: #0f0f23;
    }
    .blocklist-item .domain { flex: 1; word-break: break-all; }
    .blocklist-item .btn-del {
      background: none;
      border: none;
      color: #e53935;
      cursor: pointer;
      font-size: 16px;
      padding: 0 4px;
      line-height: 1;
    }
    .blocklist-item .btn-del:hover { color: #ff6b6b; }

    .blocklist-empty {
      text-align: center;
      color: #555;
      font-size: 12px;
      padding: 12px 0;
    }
  </style>
</head>
<body>
  <h1>myself</h1>

  <!-- ===== 全局控制区 ===== -->
  <div class="label">全局控制</div>
  <p id="statusText" class="status-text">加载中...</p>
  <button id="btnEnter" class="btn btn-enter">进入专注模式</button>
  <button id="btnLeave" class="btn btn-leave">解除专注模式</button>

  <hr class="divider">

  <!-- ===== 快捷操作区 ===== -->
  <div class="label">快捷操作</div>
  <p id="currentDomain" class="current-domain">正在获取当前标签页...</p>
  <button id="btnQuickToggle" class="btn btn-quick" disabled>--</button>

  <hr class="divider">

  <!-- ===== 手动添加区 ===== -->
  <div class="label">手动管理</div>
  <div class="input-row">
    <input id="domainInput" type="text" placeholder="输入域名，如 v2ex.com">
    <button id="btnAdd" class="btn btn-add">添加</button>
  </div>

  <hr class="divider">

  <!-- ===== 黑名单列表区 ===== -->
  <div class="label">黑名单列表</div>
  <div id="blocklistContainer" class="blocklist-container">
    <p class="blocklist-empty">加载中...</p>
  </div>

  <script src="popup.js"></script>
</body>
</html>
